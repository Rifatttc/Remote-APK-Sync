name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fix Apt Connection and Install Tools
        run: |
          # কানেকশন এরর (100) ফিক্স করার জন্য সার্ভার পরিবর্তন
          sudo sed -i 's|http://archive.ubuntu.com/ubuntu/|http://mirror.oss.maxcdn.com/ubuntu/|g' /etc/apt/sources.list
          sudo apt-get clean
          # ৩ বার চেষ্টা করবে যাতে কানেকশন ফেইল না হয়
          sudo apt-get update --fix-missing || true
          
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev \
            libssl-dev openjdk-17-jdk
          
          # বিল্ডোজার টুলস ইনস্টল
          pip install --user --upgrade "Cython<3.0" buildozer setuptools
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build Android APK
        run: |
          # পাইথনের আধুনিক এরর ফিক্স
          export PIP_BREAK_SYSTEM_PACKAGES=1
          yes | buildozer android debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SecureSync-Release
          path: bin/*.apk
