name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fix Ubuntu Repos and Install Tools
        run: |
          # গিথহাবের মিরর এরর ফিক্স করার জন্য সার্ভার চেঞ্জ (সবথেকে ইমপরট্যান্ট)
          sudo sed -i 's/archive.ubuntu.com/azure.archive.ubuntu.com/g' /etc/apt/sources.list
          sudo apt-get update || true
          
          # প্রয়োজনীয় ফাইলগুলো ক্লিন ভাবে ইনস্টল করা
          sudo apt-get install -y --fix-missing \
            git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev \
            libssl-dev openjdk-17-jdk
            
          # বিল্ডোজার ইনস্টল করা
          pip install --user --upgrade "Cython<3.0" buildozer

      - name: Start Buildozer Build
        run: |
          export PATH=$PATH:$HOME/.local/bin
          export PIP_BREAK_SYSTEM_PACKAGES=1
          # ফাস্ট টাইমে ইয়েস দিয়ে বিল্ড শুরু করা
          yes | buildozer android debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: SecureSync_APK
          path: bin/*.apk
