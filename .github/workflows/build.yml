name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt update || true
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev openjdk-17-jdk
          pip install --upgrade pip
          pip install --user --upgrade "Cython<3.0" buildozer

      - name: Build Android APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # এটি ফেইল করলেও আবার ট্রাই করবে যাতে NDK ঠিকমতো ডাউনলোড হয়
          buildozer android debug || buildozer android debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SecureSync-APK
          path: bin/*.apk
