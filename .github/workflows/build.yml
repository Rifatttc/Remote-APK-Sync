name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Force Install Dependencies
        run: |
          # Apt মিরর এরর ফিক্স
          sudo apt-get clean
          sudo apt-get update --fix-missing || true
          
          # প্রয়োজনীয় প্যাকেজগুলো সরাসরি ইনস্টল করা
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev \
            libssl-dev openjdk-17-jdk
            
          # পাইথন টুলস ইনস্টল
          pip install --user --upgrade "Cython<3.0" buildozer setuptools
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Buildozer
        run: |
          # আধুনিক পাইথন রেস্ট্রিকশন অফ করা
          export PIP_BREAK_SYSTEM_PACKAGES=1
          yes | buildozer android debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: SecureSync-App
          path: bin/*.apk
